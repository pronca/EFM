sonar.projectKey=it.eng.care.domain.flow
sonar.projectName=it.eng.care.domain.flow
sonar.sourceEncoding=UTF-8

# Test folders relativi alla root del workspace Jenkins
sonar.tests=it.eng.care.domain.flow.api/src/test/java,\
it.eng.care.domain.flow.core/src/test/java,\
it.eng.care.domain.flow.drools/src/test/java,\
it.eng.care.domain.flow.jobs/src/test/java

# Classi compilate relative alla root del workspace Jenkins
sonar.java.binaries=it.eng.care.domain.flow.api/target/classes,\
it.eng.care.domain.flow.core/target/classes,\
it.eng.care.domain.flow.drools/target/classes,\
it.eng.care.domain.flow.jobs/target/classes

# Escludi metadata SVN, target, script e il pom root del parent
sonar.exclusions=**/.svn/**,**/target/**,**/script_liquibase/**,pom.xml

# Tieni dentro solo i sorgenti Java dei 4 moduli
sonar.inclusions=it.eng.care.domain.flow.api/src/main/java/**/*.java,\
it.eng.care.domain.flow.core/src/main/java/**/*.java,\
it.eng.care.domain.flow.drools/src/main/java/**/*.java,\
it.eng.care.domain.flow.jobs/src/main/java/**/*.java

# Tieni dentro solo i test Java dei 4 moduli
sonar.test.inclusions=it.eng.care.domain.flow.api/src/test/java/**/*.java,\
it.eng.care.domain.flow.core/src/test/java/**/*.java,\
it.eng.care.domain.flow.drools/src/test/java/**/*.java,\
it.eng.care.domain.flow.jobs/src/test/java/**/*.java